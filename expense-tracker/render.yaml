services:
  - type: web
    name: spendwise
    runtime: python
    plan: free
    buildCommand: echo "No build step"
    startCommand: python server.py
    envVars:
      - key: XAI_API_KEY
        sync: false
      - key: GROK_MODEL
        value: grok-4
      - key: PYTHON_VERSION
        value: "3.12.0"